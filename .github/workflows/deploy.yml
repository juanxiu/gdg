name: Deploy to Google Cloud Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies & Lint
        run: |
          pip install ruff
          ruff check functions/

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ vars.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable GCP Services
        run: |
          gcloud services enable \
            cloudfunctions.googleapis.com \
            run.googleapis.com \
            cloudbuild.googleapis.com \
            artifactregistry.googleapis.com \
            logging.googleapis.com \
            pubsub.googleapis.com \
            cloudresourcemanager.googleapis.com

      - name: Build and Push Docker Image
        run: |
          gcloud auth configure-docker asia-northeast3-docker.pkg.dev
          docker build -t asia-northeast3-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/safepath/api:latest ./functions
          docker push asia-northeast3-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/safepath/api:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy api \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --image=asia-northeast3-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/safepath/api:latest \
            --region=asia-northeast3 \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="ENVIRONMENT=production,GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }},GCP_REGION=asia-northeast3,GOOGLE_MAPS_API_KEY=${{ vars.GOOGLE_MAPS_API_KEY }},FIREBASE_WEB_API_KEY=${{ vars.FIREBASE_WEB_API_KEY }}"

      - name: Deploy SafePath Pipeline
        run: |
          gcloud functions deploy safepath-pipeline \
            --gen2 \
            --runtime=python311 \
            --region=asia-northeast3 \
            --source=./pipeline \
            --entry-point=collect_environment_data \
            --trigger-http \
            --no-allow-unauthenticated \
            --set-env-vars="GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }},GOOGLE_MAPS_API_KEY=${{ vars.GOOGLE_MAPS_API_KEY }}"
